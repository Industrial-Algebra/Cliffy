version: 2

# Branch strategy:
# - All dependency PRs target `develop` (integration branch)
# - `main` receives only releases and hotfixes
# - Gitflow: feature/* → develop → main

updates:
  # Rust dependencies (workspace root)
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "cargo"
      include: "scope"

  # Root NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "npm"
      include: "scope"

  # cliffy-tsukoshi (pure TypeScript geometric state)
  - package-ecosystem: "npm"
    directory: "/cliffy-tsukoshi"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "typescript"
    commit-message:
      prefix: "tsukoshi"
      include: "scope"

  # create-cliffy CLI tool
  - package-ecosystem: "npm"
    directory: "/tools/create-cliffy"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "tooling"
    commit-message:
      prefix: "create-cliffy"
      include: "scope"

  # Vite plugin
  - package-ecosystem: "npm"
    directory: "/vite-plugin-algebraic-tsx"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "vite-plugin"
    commit-message:
      prefix: "vite-plugin"
      include: "scope"

  # Examples workspace
  - package-ecosystem: "npm"
    directory: "/examples"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "examples"
    commit-message:
      prefix: "examples"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "actions"
      include: "scope"
